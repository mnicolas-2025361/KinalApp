<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio Usuario</title>
    <link rel="stylesheet" href="/home-usuario.css">
</head>
<body>

<h1>Últimas Ventas</h1>

<table border="1">
    <tr>
        <th>Código</th>
        <th>Fecha</th>
        <th>Total</th>
    </tr>

    <tr th:each="v : ${ventas}">
        <td th:text="${v.codigoVenta}"></td>
        <td th:text="${v.fechaVenta}"></td>
        <td th:text="${v.total}"></td>
    </tr>
</table>

</body>
</html>
