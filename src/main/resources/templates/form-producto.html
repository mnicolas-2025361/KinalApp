<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Producto</title>
    <link rel="stylesheet" th:href="@{/form-producto.css}">
</head>
<body>

<h1>Producto</h1>

<form th:action="@{/productos/guardar}" method="post" th:object="${producto}">

    <input type="hidden" th:field="*{codigoProducto}">

    <label>Nombre:</label>
    <input type="text" th:field="*{nombreProducto}" required>
    <br><br>

    <label>Precio:</label>
    <input type="number" step="0.01" th:field="*{precio}" required>
    <br><br>

    <label>Stock:</label>
    <input type="number" th:field="*{stock}" required>
    <br><br>

    <label>Estado:</label>
    <select th:field="*{estado}">
        <option value="1">ACTIVO</option>
        <option value="0">INACTIVO</option>
    </select>
    <br><br>

    <button type="submit">Guardar</button>

</form>

</body>
</html>
